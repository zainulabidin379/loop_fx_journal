name: loop_fx_journal
description: "LOOP — Offline forex and gold trading journal."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_it: ^8.0.3
  go_router: ^15.1.2
  local_auth: ^2.3.0
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  image_picker: ^1.1.2
  file_picker: ^9.2.3
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
